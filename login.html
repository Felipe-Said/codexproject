<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | AMZ Offer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f0f2f5; display: flex; align-items: center; justify-content: center; height: 100vh; padding: 20px; }
        .login-card { background: #ffffff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 380px; }
        .logo { text-align: center; font-size: 1.6rem; font-weight: 700; color: #181c32; margin-bottom: 25px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        h2 { font-size: 1.2rem; margin-bottom: 8px; text-align: center; }
        p { color: #888; font-size: 0.85rem; text-align: center; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.85rem; }
        input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; outline: none; font-size: 1rem; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; margin-bottom: 10px; font-size: 0.95rem; }
        .btn-primary { background: #009ef7; color: white; }
        .btn-primary:active { background: #0086d1; }
        .btn-secondary { background: #f1faff; color: #009ef7; border: 1px solid #c0eaff; }
        .status-msg { display: none; margin-top: 15px; padding: 10px; border-radius: 6px; font-size: 0.8rem; text-align: center; border: 1px solid transparent; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo"><i class="fas fa-boxes-stacked" style="color: #009ef7;"></i><span>AMZ Panel</span></div>
        <h2>Bem-vindo</h2>
        <p>Acesse ou crie sua conta admin</p>
        
        <form id="mainForm" onsubmit="return false;">
            <div class="form-group">
                <label>E-mail</label>
                <input type="text" id="emailInput" placeholder="seu@email.com">
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="passwordInput" placeholder="••••••••">
            </div>
            <button type="button" class="btn btn-primary" id="loginBtn" onclick="handleLogin()">Acessar Painel</button>
            <button type="button" class="btn btn-secondary" id="signupBtn" onclick="handleSignup()">Cadastrar Novo Usuário</button>
        </form>
        
        <div id="statusMsg" class="status-msg"></div>
    </div>

    <!-- Carregar Supabase com Fallback -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <script>
        var SUPABASE_URL = 'https://jmjizeydpzdtqhedndyg.supabase.co';
        var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imptaml6ZXlkcHpkdHFoZWRuZHlnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4OTI4MDMsImV4cCI6MjA4OTQ2ODgwM30.rQJZRy364VPS6uCuTkFy9s8Tyn3KxB-E6vxv9ROrdos';
        var supabase = null;
        var retryCount = 0;

        function initSupabase() {
            if (window.supabase) {
                try {
                    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                    console.log('Supabase carregado!');
                } catch (e) {
                    showStatus('Erro na configuração do banco.', 'error');
                }
            } else if (retryCount < 10) {
                retryCount++;
                setTimeout(initSupabase, 500); // Tentar novamente em meio segundo
            } else {
                alert('Erro: Não foi possível carregar a biblioteca do Supabase (CDN bloqueado ou conexão lenta). Tente atualizar a página.');
            }
        }
        
        initSupabase();

        var statusEl = document.getElementById('statusMsg');
        var loginBtn = document.getElementById('loginBtn');
        var signupBtn = document.getElementById('signupBtn');

        function showStatus(msg, colorType) {
            statusEl.innerText = msg;
            statusEl.style.display = 'block';
            if (colorType === 'error') {
                statusEl.style.background = '#fff5f8';
                statusEl.style.color = '#f1416c';
                statusEl.style.borderColor = '#f8c5d2';
            } else {
                statusEl.style.background = '#e8fff3';
                statusEl.style.color = '#50cd89';
                statusEl.style.borderColor = '#50cd89';
            }
        }

        function handleLogin() {
            var email = document.getElementById('emailInput').value.trim();
            var password = document.getElementById('passwordInput').value;

            if (!email || !password) {
                showStatus('Preencha todos os campos.', 'error');
                return;
            }

            loginBtn.disabled = true;
            loginBtn.innerText = 'Verificando...';
            showStatus('Aguarde...', 'normal');

            supabase.auth.signInWithPassword({ email: email, password: password })
                .then(function(result) {
                    if (result.error) {
                        showStatus('Erro: ' + result.error.message, 'error');
                        loginBtn.disabled = false;
                        loginBtn.innerText = 'Acessar Painel';
                    } else {
                        window.location.href = 'admin.html';
                    }
                })
                .catch(function(err) {
                    showStatus('Erro de conexão.', 'error');
                    loginBtn.disabled = false;
                    loginBtn.innerText = 'Acessar Painel';
                });
        }

        function handleSignup() {
            var email = document.getElementById('emailInput').value.trim();
            var password = document.getElementById('passwordInput').value;

            if (!email || !password) {
                showStatus('Preencha todos os campos.', 'error');
                return;
            }

            signupBtn.disabled = true;
            signupBtn.innerText = 'Cadastrando...';
            showStatus('Processando...', 'normal');

            supabase.auth.signUp({ email: email, password: password })
                .then(function(result) {
                    signupBtn.disabled = false;
                    signupBtn.innerText = 'Cadastrar Novo Usuário';
                    
                    if (result.error) {
                        showStatus('Erro: ' + result.error.message, 'error');
                    } else {
                        if (result.data.user && result.data.user.identities && result.data.user.identities.length === 0) {
                            showStatus('Usuário já existe. Tente logar.', 'error');
                        } else if (result.data.session) {
                            window.location.href = 'admin.html';
                        } else {
                            showStatus('Sucesso! Verifique se a confirmação de email está desativada no Supabase.', 'success');
                        }
                    }
                })
                .catch(function(err) {
                    showStatus('Erro ao cadastrar.', 'error');
                    signupBtn.disabled = false;
                    signupBtn.innerText = 'Cadastrar Novo Usuário';
                });
        }
        
        // Ativar tecla Enter
        document.getElementById('mainForm').addEventListener('keydown', function(e) {
            if (e.keyCode === 13) {
                handleLogin();
            }
        });
    </script>
</body>
</html>
