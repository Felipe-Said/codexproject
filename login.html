<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | AMZ Offer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f0f2f5; display: flex; align-items: center; justify-content: center; height: 100vh; padding: 20px; }
        .login-card { background: #ffffff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 380px; }
        .logo { text-align: center; font-size: 1.6rem; font-weight: 700; color: #181c32; margin-bottom: 25px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        h2 { font-size: 1.2rem; margin-bottom: 8px; text-align: center; }
        p { color: #888; font-size: 0.85rem; text-align: center; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.85rem; }
        input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; outline: none; font-size: 1rem; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; margin-bottom: 10px; font-size: 0.95rem; }
        .btn-primary { background: #009ef7; color: white; }
        .status-msg { display: none; margin-top: 15px; padding: 10px; border-radius: 6px; font-size: 0.8rem; text-align: center; border: 1px solid transparent; word-break: break-all; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo"><i class="fas fa-boxes-stacked" style="color: #009ef7;"></i><span>AMZ Panel</span></div>
        <h2>Painel Administrativo</h2>
        <p>Acesse com suas credenciais</p>

        <form id="mainForm" onsubmit="return false;">
            <div class="form-group">
                <label>E-mail</label>
                <input type="text" id="emailInput" placeholder="seu@email.com">
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="passwordInput" placeholder="********">
            </div>
            <button type="button" class="btn btn-primary" id="loginBtn">Acessar Painel</button>
        </form>

        <div id="statusMsg" class="status-msg"></div>
    </div>

    <script src="lib/supabase.js"></script>
    <script>
        var SUPABASE_URL = 'https://jmjizeydpzdtqhedndyg.supabase.co';
        var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imptaml6ZXlkcHpkdHFoZWRuZHlnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4OTI4MDMsImV4cCI6MjA4OTQ2ODgwM30.rQJZRy364VPS6uCuTkFy9s8Tyn3KxB-E6vxv9ROrdos';
        var AUTH_BRIDGE_KEY = 'codex_admin_supabase_bridge';
        var supabaseClient = null;

        var statusEl = document.getElementById('statusMsg');
        var loginBtn = document.getElementById('loginBtn');
        var emailInput = document.getElementById('emailInput');
        var passwordInput = document.getElementById('passwordInput');

        function showStatus(msg, isError) {
            statusEl.innerText = msg;
            statusEl.style.display = 'block';
            if (isError) {
                statusEl.style.backgroundColor = '#fff5f8';
                statusEl.style.color = '#f1416c';
                statusEl.style.borderColor = '#f8c5d2';
            } else {
                statusEl.style.backgroundColor = '#e8fff3';
                statusEl.style.color = '#50cd89';
                statusEl.style.borderColor = '#50cd89';
            }
        }

        function init() {
            if (!window.supabase) {
                showStatus('Erro: Biblioteca Supabase nao encontrada. Recarregue a pagina.', true);
                return;
            }

            try {
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                console.log('Banco de dados OK');
            } catch (e) {
                showStatus('Erro ao carregar banco: ' + e.message, true);
            }
        }

        function doLogin() {
            var email = emailInput.value.trim();
            var password = passwordInput.value;

            if (!email || !password) {
                showStatus('Preencha email e senha.', true);
                return;
            }

            loginBtn.disabled = true;
            loginBtn.innerText = 'Entrando...';
            showStatus('Verificando conta...', false);

            if (!supabaseClient) {
                showStatus('Banco de dados ainda nao carregou. Aguarde 3 segundos.', true);
                loginBtn.disabled = false;
                loginBtn.innerText = 'Acessar Painel';
                return;
            }

            supabaseClient.auth.signInWithPassword({ email: email, password: password })
                .then(function(res) {
                    if (res.error) {
                        showStatus('Falha: ' + res.error.message, true);
                        loginBtn.disabled = false;
                        loginBtn.innerText = 'Acessar Painel';
                        return;
                    }

                    try {
                        if (res.data && res.data.session) {
                            sessionStorage.setItem(AUTH_BRIDGE_KEY, JSON.stringify({
                                access_token: res.data.session.access_token,
                                refresh_token: res.data.session.refresh_token,
                                expires_at: res.data.session.expires_at || null,
                                created_at: Date.now()
                            }));
                        }
                    } catch (bridgeError) {}

                    showStatus('Sucesso! Redirecionando...', false);
                    window.location.href = 'admin.html';
                })
                .catch(function() {
                    showStatus('Erro de rede. Tente novamente.', true);
                    loginBtn.disabled = false;
                    loginBtn.innerText = 'Acessar Painel';
                });
        }

        loginBtn.onclick = doLogin;
        document.getElementById('mainForm').onkeydown = function(e) {
            if (e.keyCode === 13) {
                doLogin();
            }
        };

        setTimeout(init, 500);
    </script>
</body>
</html>
